version: 1
patterns:
  - pattern: "\\b(today|tonight|currently|right now|temporary|for now)\\b"
    severity: advisory
    reason: "Time-sensitive wording should be reviewed before it becomes durable."
  - pattern: "\\b(done|fixed|completed|phase [0-9]+|PR #[0-9]+)\\b"
    severity: advisory
    reason: "Run-status wording may be stale after the session ends."
  - pattern: "\\b(mic check|status check|reply exactly|tool_choice)\\b"
    severity: advisory
    reason: "Chatter or API-noise terms usually do not belong in durable context."

# Junk / secret handle markers (Facet scrub + governance flags)
secret_or_junk_handle_markers:
  - "/.ssh/"
  - "id_rsa"
  - "id_ed25519"
  - "auth.json"
  - "credentials.json"
  - "/.env"
  - "known_hosts"

system_prompt_echo_markers:
  - "review the conversation above and consider saving to memory"
  - "you can only call memory and skill management tools"

