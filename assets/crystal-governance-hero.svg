<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Crystal Governance Starter</title>
  <desc id="desc">A dark technical banner showing a long Hermes session becoming compact living context and a clean handoff.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080d1c"/>
      <stop offset="1" stop-color="#17132c"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#312e55" stroke-width="0.6" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.75"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="24" fill="url(#grid)"/>
  <circle cx="1010" cy="210" r="240" fill="#7c3aed" opacity="0.08"/>
  <circle cx="900" cy="80" r="150" fill="#0891b2" opacity="0.08"/>

  <g transform="translate(64 62)">
    <rect width="208" height="28" rx="14" fill="#211a3b" stroke="#6d5ba7"/>
    <circle cx="18" cy="14" r="5" fill="#a78bfa"/>
    <text x="34" y="19" fill="#ddd6fe" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="1.5">CRYSTAL CONTINUITY</text>

    <text x="0" y="112" fill="#fafafa" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="700">Keep long sessions on track.</text>
    <text x="0" y="152" fill="#b7b3cc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">Turn sprawling transcript history into bounded living context,</text>
    <text x="0" y="179" fill="#b7b3cc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">clean handoffs, and honest efficiency gains.</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M850 70L945 118L985 222L926 318L810 330L738 244L760 132Z" fill="#12162b" stroke="url(#crystal)" stroke-width="2"/>
    <path d="M850 70L852 228M945 118L852 228M985 222L852 228M926 318L852 228M810 330L852 228M738 244L852 228M760 132L852 228" fill="none" stroke="url(#crystal)" stroke-width="1.4" opacity="0.75"/>
    <path d="M850 70L760 132L852 228L945 118ZM852 228L738 244L810 330L926 318L985 222Z" fill="url(#crystal)" opacity="0.08"/>
    <circle cx="852" cy="228" r="8" fill="#e9d5ff"/>
  </g>

  <g transform="translate(632 298)">
    <rect width="198" height="66" rx="13" fill="#0c1f2a" stroke="#22d3ee"/>
    <text x="18" y="27" fill="#a5f3fc" font-family="ui-monospace, monospace" font-size="11">PLANNING ESTIMATE</text>
    <text x="18" y="51" fill="#ecfeff" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700">about 30% net</text>
  </g>

  <g transform="translate(965 298)">
    <rect width="171" height="66" rx="13" fill="#21182f" stroke="#a78bfa"/>
    <text x="18" y="27" fill="#ddd6fe" font-family="ui-monospace, monospace" font-size="11">BUSY-DAY RANGE</text>
    <text x="18" y="51" fill="#faf5ff" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700">25–35%</text>
  </g>


  <rect x="64" y="348" width="506" height="2" rx="1" fill="url(#line)" opacity="0.7"/>
  <text x="64" y="382" fill="#77758d" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">LIVING CONTEXT • HONEST ECONOMICS • FAIL-CLOSED</text>
</svg>
