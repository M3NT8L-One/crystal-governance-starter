# Example Crystal worker settings.
# This is a starter contract, not a complete runtime implementation.
# It intentionally uses no provider, model, route, or private runtime values.

crystal_workers:
  state_root: /path/to/crystal-state
  enabled_profiles:
    - default

  actor_scope:
    positive_frontdoor_classification_required: true
    fail_closed_when_platform_and_source_empty: true
    unbound_context_engine: exclude
    ambient_process_identity_may_bind_unbound_engine: false
    background_review_thread_name: bg-review
    exclude:
      - auxiliary_model
      - subagent
      - cron
      - scheduler
      - kanban_worker
      - maintenance
      - evaluation
      - review
      - scratch
    gate_boundaries:
      - pre_and_post_turn_hooks
      - complete_context_engine_lane
    excluded_engine_behavior: builtin_compressor_without_crystal_writes

  deterministic_tick:
    cadence: every_meaningful_frontdoor_turn
    redact_before_write: true
    raw_tool_payloads: unavailable
    tool_context: sanitized_summaries

  facet:
    purpose: stateful authoritative hot-section refinement
    meaningful_turns_since_attempt: 6
    accumulated_tool_results_since_success: 12
    cooldown_turns: 2
    also_due_on:
      - lifecycle_transition
      - quality_reason
    skip_if_no_meaningful_delta: true
    output_schema: operations
    operation_fields: [section, action, bullets]
    section_actions:
      snapshot_sections:
        sections:
          - Current Objective
          - Current Working State
          - Active Open Loops
          - Recent Useful Context / Hot Delta
        allowed: [replace, clear]
      durable_sections:
        sections:
          - Important Constraints
          - Decisions and Rationale
          - Relevant Files / Artifacts / Handles
        allowed: [merge]
      unknown_or_stale_sections:
        allowed: []
    empty_or_invalid_operations_are_success: false
    success_clears_only_decision_scoped_pending_state: true
    redaction:
      - secret_like_values
      - private_paths
      - raw_payloads_and_blobs
      - system_prompt_echoes
      - junk_or_mangled_handles
    secret_only_authoritative_operation: reject

  crystallizer:
    purpose: whole-session-doc rewrite (pressure compact or earlier quality hygiene)
    trigger:
      - session_doc_budget_percent >= 0.75
      - turns_since_medium_compact >= 12
      - quality_hygiene_after_min_turns
    pressure_target_budget_percent: 0.50
    hygiene_soft_target_fraction_of_current_doc: 0.62
    hygiene_min_turns: 6
    preserve_last_completed_doc_on_failure: true
    realtime_steering: false

  gem_cutter:
    purpose: diff-aware idle governance prune and sync
    cadence: 30m
    wake_if:
      - profile_or_session_crystal_hash_changed_since_last_tick
    no_model_if:
      - no_crystal_diff_since_last_tick
      - active_session_not_idle_enough_for_deep_prune
      - changed_but_clean_and_under_idle_target
    model_work_if:
      - changed_and_idle_and_over_idle_target
      - changed_and_idle_and_quality_flags_present
    idle_deep_prune_after_minutes: 60
    seal_hash_after_rewrite_and_profile_sync: true
    profile_hub_promotion:
      order_by: last_activity_at
      tie_breaker: session_id
      missing_or_malformed_activity_sorts_oldest: true
      newest_session_authoritative_for_volatile_state: true
      historical_nonvolatile_claims:
        allow_when_exact_in_newest: true
        distinct_recent_sessions_required: 2
        same_session_repetition_counts_once: true
      freshness_anchor: newest_session_activity
      volatile_matching: whole_tokens_and_narrow_phrases
      read_only_audit_may_sync_profile_hub: false
    allowed_actions:
      - deep_prune_stale_context
      - trim_redundant_or_superseded_notes
      - reconcile_related_parallel_sessions
      - update_profile_crystal_from_confirmed_session_state
      - produce_memory_or_skill_promotion_proposals
    forbidden_actions:
      - delete_raw_transcript_or_evidence
      - silently_write_permanent_memory_facts_or_skills
      - collapse_unrelated_sessions_together
      - steer_live_agent_behavior

  concurrency:
    lock_order: [session_document, session_metadata]
    registry_locked_read_modify_write: true
    metadata_mutation_helper_required: true
    heterogeneous_writer_tests_required: true
    main_request_reads_last_completed_doc: true
    lock_stale_seconds: 900

  excluded_compressor_state_sync:
    bidirectional: true
    before_and_after_every_delegated_call: true
    synchronized_state_fields:
      - context_window
      - max_token_budget
      - max_token_estimate
      - provider_usage
      - fallback_threshold
      - preflight_threshold
      - compaction_threshold
      - smart_compaction_threshold
      - threshold
      - compression_count
      - last_compression_error
      - last_context_probe
      - last_context_probe_error
      - post_compression_pending
      - compaction_in_progress
      - effectiveness_enabled
      - effectiveness_cooldown
      - session_binding
    preserve_positional_and_keyword_binding: true
    cache_binding_before_actor_identity: true
    rebind_after_fallback_recreation: true
    stateful_tests_required:
      - lowered_threshold_round_trip
      - preflight_deferral
      - post_compression_latch_round_trip
      - real_usage_clears_latches_on_both_objects

  render:
    active_fuller_fraction: 0.60
    steady_fraction: 0.40
    idle_clean_fraction: 0.25

  savings_reporting:
    distinguish:
      - gross_history_reduction
      - post_compression_total_request_reduction
      - full_day_net_logical_token_reduction
      - billable_equivalent_or_dollar_reduction
    never_report_history_ratio_as_daily_savings: true
