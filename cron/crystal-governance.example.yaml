# Example quiet Crystal governance cron.
# Adapt the paths for your environment before use.

name: crystal-governance
schedule: "*/30 * * * *"
enabled: false
description: "Run read-only Crystal governance audit and health checks; wake only on findings or degraded health."
command:
  script: "scripts/run_crystal_checks.py --root /path/to/crystal-state --out reports/crystal/latest"
delivery:
  mode: local
  quiet_if_clean: true
review:
  reviewer_required_for:
    - degraded
    - unhealthy
    - medium
    - high
